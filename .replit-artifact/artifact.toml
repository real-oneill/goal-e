kind = "mobile"
previewPath = "/"
title = "Session Journal"
version = "1.0.0"
id = "artifacts/session-journal"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18929

[services.development]
run = "pnpm --filter @workspace/session-journal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/session-journal", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/session-journal", "run", "serve" ]

[services.env]
PORT = "18929"
BASE_PATH = "/"
